<!DOCTYPE html>
<html lang="tr" data-mv-theme="obsidian-cyan">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>metavis1on | Yönetici Girişi</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#030407">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../shared/css/tokens.css">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/themes.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="../shared/css/layout.css">

  <style>
    /* admin/index.html — login ekranı sayfaya özel cila (v11.2.0) */
    body { background: var(--mv-bg-deep); }

    .admin-auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--mv-radius-full);
      background: rgba(14, 165, 233, 0.08);
      border: 1px solid rgba(14, 165, 233, 0.30);
      color: var(--mv-theme-primary);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: var(--mv-letter-wide);
      text-transform: uppercase;
    }
    .admin-auth-badge__dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }
    .admin-auth-card-wrap { text-align: center; margin-bottom: var(--mv-space-md); }

    .admin-auth-foot {
      margin-top: var(--mv-space-lg);
      padding-top: var(--mv-space-md);
      border-top: 1px solid var(--mv-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.74rem;
      color: var(--mv-text-dim);
      gap: var(--mv-space-sm);
      flex-wrap: wrap;
    }
    .admin-auth-foot__kbd {
      font-family: var(--mv-font-mono);
      padding: 2px 8px;
      border-radius: var(--mv-radius-sm);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--mv-border);
      color: var(--mv-text-muted);
    }

    @media (max-width: 480px) {
      .mv-back-link { top: 16px !important; left: 16px !important; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <main class="mv-auth-page">
    <a class="mv-back-link" href="../index.html" style="position:absolute; top:24px; left:24px;">
      ← Ana Siteye Dön
    </a>

    <div class="mv-auth-card">
      <div class="admin-auth-card-wrap">
        <span class="admin-auth-badge">
          <span class="admin-auth-badge__dot"></span>
          Yetkili Yönetim Alanı
        </span>
        <!-- beta.3: opt-in trial visibility — operator-only hint.
             Display toggled by updateFirebaseTrialIndicator() based on
             isFirebaseLoginTrialEnabled(); stays hidden whenever the
             default devLogin path is in effect. Not a security boundary —
             purely a "you are in trial mode" cue. -->
        <span id="firebaseTrialIndicator" class="admin-auth-badge"
              style="display:none; margin-left:8px; background:rgba(176, 38, 255, 0.10); border-color:rgba(176, 38, 255, 0.35); color:#c084fc;"
              role="status" aria-live="polite">
          <span class="admin-auth-badge__dot"></span>
          Firebase Trial Aktif
        </span>
        <!-- pre.4: opt-in admin allowlist gate indicator — operator-only
             cue, mirrors the firebase trial badge shape so no CSS change
             is required. Display toggled by updateAdminAllowlistGateIndicator()
             based on isAdminAllowlistGateEnabled(). Hidden by default so
             the flag-off page load never flashes the indicator. NOT a
             security boundary — the submit handler decides allowlist
             behavior independently of this badge. -->
        <span id="adminAllowlistGateIndicator" class="admin-auth-badge"
              style="display:none; margin-left:8px; background:rgba(34, 197, 94, 0.10); border-color:rgba(34, 197, 94, 0.35); color:#86efac;"
              role="status" aria-live="polite">
          <span class="admin-auth-badge__dot"></span>
          Allowlist Gate Aktif
        </span>
      </div>

      <div class="mv-auth-card__logo">
        <img src="../assets/logo-mark-64.png"
             srcset="../assets/logo-mark-64.png 1x, ../assets/logo-mark-128.png 2x"
             alt="metavis1on" width="56" height="56" decoding="async"
             onerror="this.style.display='none'">
        <div style="font-size:0.72rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--mv-theme-primary);">
          Yönetim Merkezi
        </div>
      </div>

      <h1 class="mv-auth-card__title">Yönetici Girişi</h1>
      <p class="mv-auth-card__sub">
        metavis1on portal yönetim paneline erişmek için yetkili hesap bilgilerinizi girin.
      </p>

      <form class="mv-auth-form" id="loginForm" novalidate>
        <div id="authFeedback" class="mv-auth-feedback" role="alert"></div>

        <div class="mv-field">
          <label class="mv-field__label" for="login-user">Kullanıcı Adı / E-posta</label>
          <input
            class="mv-input"
            type="text"
            id="login-user"
            name="user"
            autocomplete="username"
            placeholder="admin"
            required
            minlength="3">
        </div>

        <div class="mv-field">
          <label class="mv-field__label" for="login-pass">Parola</label>
          <input
            class="mv-input"
            type="password"
            id="login-pass"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
            minlength="6">
        </div>

        <button class="mv-btn mv-btn--primary mv-btn--block mv-btn--lg" type="submit" id="loginBtn">
          Yönetim Paneline Gir
        </button>

        <div class="mv-text-center mv-text-muted" style="font-size:0.78rem; margin-top:8px;">
          🔒 Bu sayfa yetkili erişim içindir.
        </div>
      </form>

      <div class="admin-auth-foot">
        <span>metavis1on Admin · v11.2.0</span>
        <span>Enter <kbd class="admin-auth-foot__kbd">↵</kbd> ile gönder</span>
      </div>

      <!--
        GELİŞTİRME NOTU:
        Bu login ekranı şu an SessionStorage tabanlı geçici bir oturum üretir.
        Gerçek kimlik doğrulama (Firebase Auth) ileride shared/js/auth.js
        içine eklenecek. Bu dosyada gerçek admin parolası SAKLANMAZ.
      -->
    </div>
  </main>

  <script src="../shared/config/site.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <!-- v12.1.0-pre.1: passive Firestore SDK load. NOT used for any
       read/write in this phase. MV_FIREBASE.hasFirestoreSdk() /
       isFirestoreReady() / getFirestoreProvider() / inspectFirestore()
       only probe SDK + app readiness; no firebase.firestore()
       instance is created here. CRUD lands in v12.2+/v12.3+. -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="../shared/config/firebase.js"></script>
  <script src="../shared/js/core.js"></script>
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/auth.js"></script>

  <script>
    if (window.MV_FIREBASE && typeof window.MV_FIREBASE.init === 'function') {
      window.MV_FIREBASE.init(window.firebase);
    }
  </script>

  <script>
    (function () {
      'use strict';

      const FIREBASE_LOGIN_TRIAL_KEY = 'mv_firebase_login_trial';
      const ADMIN_ALLOWLIST_GATE_KEY = 'mv_admin_allowlist_gate_trial';

      // beta.2 + pre.4: flag persistence MUST run before any redirect /
      // short-circuit so freshly-arrived ?mvFirebaseLogin=1 (or =0) and
      // ?mvAdminAllowlistGate=1 (or =0) are honored even when
      // MV.auth.isAuthed() bounces to dashboard.
      persistFirebaseLoginTrialIfRequested();
      persistAdminAllowlistGateIfRequested();

      // Zaten giriş yapmışsa direkt dashboard'a yönlendir
      if (MV.auth.isAuthed()) {
        window.location.replace('./dashboard.html');
        return;
      }

      const form = document.getElementById('loginForm');
      const feedback = document.getElementById('authFeedback');
      const userInput = document.getElementById('login-user');
      const passInput = document.getElementById('login-pass');
      const btn = document.getElementById('loginBtn');

      function showError(msg) {
        feedback.textContent = msg;
        feedback.classList.add('is-visible');
        feedback.classList.remove('is-info');
      }
      function showInfo(msg) {
        feedback.textContent = msg;
        feedback.classList.add('is-visible');
        feedback.classList.add('is-info');
      }
      function clearFeedback() {
        feedback.classList.remove('is-visible');
        feedback.classList.remove('is-info');
      }

      /* alpha.19 + beta.2: Opt-in Firebase login trial with session
         persistence. Trial is OFF by default. The submit handler keeps
         the existing MV.auth.devLogin / sessionStorage path bit-
         identical unless an explicit opt-in tells us to use Firebase.
         Three opt-in channels (any one is sufficient):
           1) window.MV_ADMIN_FIREBASE_LOGIN === true (explicit, any host)
           2) URL query ?mvFirebaseLogin=1 (or =true) on dev hosts only
              (localhost / 127.0.0.1 / 0.0.0.0 / file:)
           3) sessionStorage 'mv_firebase_login_trial' === '1', written
              by channel #2 on a prior visit so the trial survives an
              in-session navigation that drops the query string
              (login → dashboard).
         On dev hosts ?mvFirebaseLogin=1/true also writes the
         sessionStorage key; ?mvFirebaseLogin=0/false clears it. On
         production hosts the query param is fully ignored (no read,
         no write) so a stray URL cannot toggle the trial in prod.
         When the trial is on AND the wrapper is present AND Firebase is
         ready, signIn + createSessionFromResult drive the redirect.
         When Firebase is not ready (placeholder, missing-loader, etc.)
         we fall back to devLogin so the form still works. When Firebase
         IS ready but signIn fails (wrong credentials, network error),
         we do NOT fall back to devLogin — that would mask a real
         credential check. We show a user-friendly error instead. */

      function isDevHost() {
        if (typeof window === 'undefined' || !window.location) return false;
        if (window.location.protocol === 'file:') return true;
        const h = window.location.hostname || '';
        return h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0';
      }

      function getFirebaseLoginTrialParam() {
        if (typeof window === 'undefined' || !window.location) return null;
        try {
          const q = new URLSearchParams(window.location.search || '');
          if (!q.has('mvFirebaseLogin')) return null;
          return q.get('mvFirebaseLogin');
        } catch (e) {
          return null;
        }
      }

      function persistFirebaseLoginTrialIfRequested() {
        // Production hosts: full no-op (no read, no write).
        if (!isDevHost()) return;
        const v = getFirebaseLoginTrialParam();
        if (v === null) return;
        try {
          if (v === '1' || v === 'true') {
            sessionStorage.setItem(FIREBASE_LOGIN_TRIAL_KEY, '1');
          } else if (v === '0' || v === 'false') {
            sessionStorage.removeItem(FIREBASE_LOGIN_TRIAL_KEY);
          }
        } catch (e) { /* swallow */ }
      }

      function isFirebaseLoginTrialPersisted() {
        try {
          return sessionStorage.getItem(FIREBASE_LOGIN_TRIAL_KEY) === '1';
        } catch (e) {
          return false;
        }
      }

      function isFirebaseLoginTrialEnabled() {
        if (typeof window === 'undefined') return false;
        // 1) Explicit global flag (any host)
        if (window.MV_ADMIN_FIREBASE_LOGIN === true) return true;
        // 2) Dev host + valid query param (immediate activation;
        //    persistence is also written by the call above so the
        //    flag survives navigation to the dashboard).
        if (isDevHost()) {
          const v = getFirebaseLoginTrialParam();
          if (v === '1' || v === 'true') return true;
        }
        // 3) sessionStorage persistence
        return isFirebaseLoginTrialPersisted();
      }

      /* pre.4: opt-in admin allowlist gate flag. Mirrors the firebase
         login trial flag pattern (beta.2) so the same three-channel
         opt-in works: explicit global, dev-host query param, sessionStorage
         persistence. The gate ONLY fires inside runFirebaseLogin after a
         successful signIn — devLogin path is unaffected. When the gate
         flag is OFF the Firebase login trial behaves bit-identical with
         alpha.19 / beta.1 / pre.3.
         Channels (any one is sufficient):
           1) window.MV_ADMIN_ALLOWLIST_GATE === true (explicit, any host)
           2) URL query ?mvAdminAllowlistGate=1 (or =true) on dev hosts only
              (localhost / 127.0.0.1 / 0.0.0.0 / file:)
           3) sessionStorage 'mv_admin_allowlist_gate_trial' === '1', written
              by channel #2 on a prior visit so the gate survives an
              in-session navigation that drops the query string.
         On dev hosts ?mvAdminAllowlistGate=1/true also writes the
         sessionStorage key; ?mvAdminAllowlistGate=0/false clears it. On
         production hosts the query param is fully ignored (no read,
         no write) so a stray URL cannot toggle the gate in prod. The
         explicit global remains the only way to activate the gate in
         production, kept as a deliberate override channel. */
      function getAdminAllowlistGateParam() {
        if (typeof window === 'undefined' || !window.location) return null;
        try {
          const q = new URLSearchParams(window.location.search || '');
          if (!q.has('mvAdminAllowlistGate')) return null;
          return q.get('mvAdminAllowlistGate');
        } catch (e) {
          return null;
        }
      }

      function persistAdminAllowlistGateIfRequested() {
        // Production hosts: full no-op (no read, no write).
        if (!isDevHost()) return;
        const v = getAdminAllowlistGateParam();
        if (v === null) return;
        try {
          if (v === '1' || v === 'true') {
            sessionStorage.setItem(ADMIN_ALLOWLIST_GATE_KEY, '1');
          } else if (v === '0' || v === 'false') {
            sessionStorage.removeItem(ADMIN_ALLOWLIST_GATE_KEY);
          }
        } catch (e) { /* swallow */ }
      }

      function isAdminAllowlistGatePersisted() {
        try {
          return sessionStorage.getItem(ADMIN_ALLOWLIST_GATE_KEY) === '1';
        } catch (e) {
          return false;
        }
      }

      function isAdminAllowlistGateEnabled() {
        if (typeof window === 'undefined') return false;
        // 1) Explicit global flag (any host)
        if (window.MV_ADMIN_ALLOWLIST_GATE === true) return true;
        // 2) Dev host + valid query param (immediate activation;
        //    persistence is also written by persistAdminAllowlistGateIfRequested
        //    so the flag survives an in-session navigation).
        if (isDevHost()) {
          const v = getAdminAllowlistGateParam();
          if (v === '1' || v === 'true') return true;
        }
        // 3) sessionStorage persistence
        return isAdminAllowlistGatePersisted();
      }

      /* beta.3: operator-visible trial mode hint.
         Renders the #firebaseTrialIndicator badge only when
         isFirebaseLoginTrialEnabled() is true. Hidden by default
         (the element ships with inline display:none so it never
         flashes during a flag-off page load). This is NOT a
         security boundary — the actual submit handler decides
         which path runs. The indicator only mirrors that decision
         so the operator knows what mode they are in. */
      function updateFirebaseTrialIndicator() {
        try {
          const el = document.getElementById('firebaseTrialIndicator');
          if (!el) return;
          el.style.display = isFirebaseLoginTrialEnabled() ? 'inline-flex' : 'none';
        } catch (e) { /* swallow */ }
      }

      /* pre.4: same shape + guarantees as updateFirebaseTrialIndicator
         for the new allowlist gate badge. Inline display:none ships in
         HTML so the indicator never flashes during a flag-off page
         load. The badge mirrors the flag state, not effective behavior;
         e.g. it shows on a devLogin-only path too if the operator set
         the flag standalone. Operator interpretation. */
      function updateAdminAllowlistGateIndicator() {
        try {
          const el = document.getElementById('adminAllowlistGateIndicator');
          if (!el) return;
          el.style.display = isAdminAllowlistGateEnabled() ? 'inline-flex' : 'none';
        } catch (e) { /* swallow */ }
      }

      function hasFirebaseLoginWrapper() {
        return !!(window.MV && window.MV.auth && window.MV.auth.firebase &&
                  typeof window.MV.auth.firebase.signIn === 'function' &&
                  typeof window.MV.auth.firebase.createSessionFromResult === 'function');
      }

      /* pre.4: probeAdminAccess helper presence check. The allowlist
         gate fails closed when this helper is absent — see runFirebaseLogin
         gate branch. */
      function hasAdminAllowlistGateWrapper() {
        return !!(window.MV && window.MV.auth && window.MV.auth.firebase &&
                  typeof window.MV.auth.firebase.probeAdminAccess === 'function');
      }

      function firebaseErrorMessage(reason) {
        switch (reason) {
          case 'auth/wrong-password':
          case 'auth/user-not-found':
          case 'auth/invalid-credential':
          case 'auth/invalid-login-credentials':
            return 'E-posta veya şifre hatalı.';
          case 'auth/invalid-email':
          case 'invalid-email':
            return 'Geçerli bir e-posta gir.';
          case 'invalid-password':
            return 'Parola en az 6 karakter olmalı.';
          case 'missing-credentials':
            return 'E-posta ve şifre zorunludur.';
          case 'auth/too-many-requests':
            return 'Çok fazla deneme yapıldı. Bir süre sonra tekrar dene.';
          case 'auth/network-request-failed':
            return 'Bağlantı hatası. İnternet veya Firebase bağlantısını kontrol et.';
          case 'auth/user-disabled':
            return 'Bu hesap devre dışı bırakılmış.';
          case 'no-provider':
          case 'no-sign-in-method':
          case 'auth-init-error':
            return 'Firebase giriş altyapısı hazır değil.';
          default:
            return 'Firebase giriş denemesi başarısız oldu.';
        }
      }

      /* pre.4: friendly Turkish messages for allowlist gate verdicts.
         Mapped from MV.auth.firebase.probeAdminAccess() reason codes.
         Unknown reason → generic fallback. Empty/null reason is treated
         as the generic case so a malformed probe response cannot fall
         through silently. */
      function allowlistGateMessage(verdict) {
        const reason = verdict && verdict.reason;
        switch (reason) {
          case 'admin-doc-missing':
            return 'Bu Firebase kullanıcısı admin allowlist içinde değil.';
          case 'inactive-admin':
            return 'Bu admin hesabı devre dışı bırakılmış.';
          case 'invalid-role':
            return 'Bu admin hesabının rol bilgisi geçersiz.';
          case 'permission-denied':
            return 'Admin yetki kontrolü için izin alınamadı.';
          case 'firestore-not-ready':
          case 'auth-not-ready':
            return 'Admin yetki kontrolü şu anda hazır değil.';
          case 'no-current-user':
            return 'Firebase oturumu doğrulanamadı.';
          default:
            return 'Admin yetki kontrolü başarısız oldu.';
        }
      }

      /* pre.4: best-effort Firebase Auth signOut after an allowlist
         deny. The local mv_admin_session is never written on a deny
         path, so the admin gate (MV.auth.requireAdmin) stays closed
         regardless of this cleanup. The signOut here only clears the
         Firebase Auth tab-level state so a follow-up reload does not
         present a stale currentUser. Failures are swallowed (debug
         only); they MUST NOT overwrite the user-facing allowlist
         message — that would mask the actual reason the operator
         was rejected. */
      function tryFirebaseSignOutCleanup() {
        try {
          if (!window.MV || !window.MV.auth || !window.MV.auth.firebase ||
              typeof window.MV.auth.firebase.signOut !== 'function') {
            return;
          }
          Promise.resolve()
            .then(function () { return window.MV.auth.firebase.signOut(); })
            .then(function (out) { debugLog('pre.4 cleanup signOut:', out); })
            .catch(function (e) { debugLog('pre.4 cleanup signOut threw:', e); });
        } catch (e) {
          debugLog('pre.4 cleanup signOut sync error:', e);
        }
      }

      function debugLog() {
        if (window.MV_DEBUG_AUTH === true && window.console && typeof console.log === 'function') {
          const args = ['[alpha.19 login]'].concat([].slice.call(arguments));
          console.log.apply(console, args);
        }
      }

      function runDevLogin(u, p) {
        setTimeout(function () {
          const result = MV.auth.devLogin(u, p);
          if (result.ok) {
            showInfo('Giriş başarılı, panel yükleniyor...');
            setTimeout(function () {
              window.location.replace('./dashboard.html');
            }, 500);
          } else {
            showError(result.error || 'Giriş başarısız.');
            btn.disabled = false;
            btn.textContent = 'Yönetim Paneline Gir';
          }
        }, 350);
      }

      /* pre.4: shared "bridge + redirect" tail used by both the legacy
         signIn-only path and the allowlist-gated path. The bridge
         payload shape stays bit-identical with alpha.19; role is NOT
         written into mv_admin_session in this phase, so any downstream
         consumer of getUser() / requireAdmin() sees the exact same
         shape it always did. Adding role to the session payload is a
         deliberately separate phase decision (see CHANGELOG). */
      function bridgeAndRedirect(result) {
        const bridge = MV.auth.firebase.createSessionFromResult(result);
        debugLog('bridge result:', bridge);
        if (bridge && bridge.ok === true) {
          showInfo('Giriş başarılı, panel yükleniyor...');
          setTimeout(function () {
            window.location.replace('./dashboard.html');
          }, 500);
          return;
        }
        showError(firebaseErrorMessage(bridge && bridge.reason));
        btn.disabled = false;
        btn.textContent = 'Yönetim Paneline Gir';
      }

      /* pre.4: opt-in admin allowlist gate. Called from runFirebaseLogin
         only when isAdminAllowlistGateEnabled() AND
         hasAdminAllowlistGateWrapper() both hold. probeAdminAccess()
         reads admins/{uid} via the pre.3 helper and returns a verdict.
           allowed:true  → bridge + redirect (existing chain).
           else (deny / error / readiness fail) → no bridge, no redirect,
           no devLogin fallback. mv_admin_session is never written.
           A best-effort Firebase Auth signOut is attempted to clear the
           tab-level Auth state. */
      function runAdminAllowlistGate(result) {
        Promise.resolve()
          .then(function () { return MV.auth.firebase.probeAdminAccess(); })
          .then(function (verdict) {
            debugLog('allowlist gate verdict:', verdict);
            if (verdict && verdict.ok === true && verdict.allowed === true) {
              bridgeAndRedirect(result);
              return;
            }
            // Deny / error / readiness fail — fail closed.
            showError(allowlistGateMessage(verdict));
            tryFirebaseSignOutCleanup();
            btn.disabled = false;
            btn.textContent = 'Yönetim Paneline Gir';
          })
          .catch(function (err) {
            debugLog('allowlist gate threw:', err);
            showError('Admin yetki kontrolü başarısız oldu.');
            tryFirebaseSignOutCleanup();
            btn.disabled = false;
            btn.textContent = 'Yönetim Paneline Gir';
          });
      }

      function runFirebaseLogin(u, p) {
        Promise.resolve()
          .then(function () { return MV.auth.firebase.signIn(u, p); })
          .then(function (result) {
            debugLog('signIn result:', result);
            if (!result || result.enabled === false) {
              // Firebase not ready → safe fallback to devLogin.
              debugLog('Firebase not ready (reason=' + (result && result.reason) + '), falling back to devLogin');
              runDevLogin(u, p);
              return;
            }
            if (result.ok === true) {
              // pre.4: opt-in admin allowlist gate.
              if (isAdminAllowlistGateEnabled()) {
                if (!hasAdminAllowlistGateWrapper()) {
                  // Gate ON but probeAdminAccess unavailable: fail closed
                  // rather than silently bridging. This keeps the gate's
                  // contract — "no allowlist verify, no session" — even
                  // when the helper is missing at runtime.
                  debugLog('allowlist gate: probeAdminAccess helper missing');
                  showError('Admin yetki kontrolü için altyapı eksik.');
                  tryFirebaseSignOutCleanup();
                  btn.disabled = false;
                  btn.textContent = 'Yönetim Paneline Gir';
                  return;
                }
                runAdminAllowlistGate(result);
                return;
              }
              // Legacy path (gate OFF) — bit-identical with alpha.19+.
              bridgeAndRedirect(result);
              return;
            }
            // enabled:true, ok:false → Firebase reachable but signIn failed.
            // NO devLogin fallback here — a credential check must not be
            // silently downgraded.
            showError(firebaseErrorMessage(result.reason));
            btn.disabled = false;
            btn.textContent = 'Yönetim Paneline Gir';
          })
          .catch(function (err) {
            debugLog('unexpected throw:', err);
            showError('Firebase giriş denemesi başarısız oldu.');
            btn.disabled = false;
            btn.textContent = 'Yönetim Paneline Gir';
          });
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearFeedback();

        const u = userInput.value.trim();
        const p = passInput.value;

        btn.disabled = true;
        btn.textContent = 'Doğrulanıyor...';

        if (isFirebaseLoginTrialEnabled() && hasFirebaseLoginWrapper()) {
          runFirebaseLogin(u, p);
        } else {
          runDevLogin(u, p);
        }
      });

      // İlk input'a fokus
      setTimeout(function () { userInput.focus(); }, 100);

      // beta.3 + pre.4: reflect current trial / gate flag state in the
      // indicator badges. Order matches the DOM order.
      updateFirebaseTrialIndicator();
      updateAdminAllowlistGateIndicator();
    })();
  </script>
</body>
</html>
