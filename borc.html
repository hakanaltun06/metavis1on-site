<!DOCTYPE html>
<html lang="tr" data-mv-theme="obsidian-cyan">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="refresh" content="2; url=/admin/borc/">
    <title>metavis1on | Borç Paneli — Yönlendiriliyor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="shared/css/tokens.css">
    <link rel="stylesheet" href="shared/css/reset.css">
    <link rel="stylesheet" href="shared/css/themes.css">
    <link rel="stylesheet" href="shared/css/components.css">
    <link rel="stylesheet" href="shared/css/layout.css">

    <style>
        .redirect-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: var(--mv-space-lg);
            position: relative;
            overflow: hidden;
        }
        .redirect-wrap::before,
        .redirect-wrap::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }
        .redirect-wrap::before {
            top: -10%; left: -10%;
            width: 45vw; height: 45vw;
            background: var(--mv-theme-primary);
        }
        .redirect-wrap::after {
            bottom: -10%; right: -10%;
            width: 55vw; height: 55vw;
            background: var(--mv-accent-purple);
        }

        .redirect-card {
            width: 100%;
            max-width: 480px;
            padding: var(--mv-space-xl);
            background: var(--mv-bg-glass);
            border: 1px solid var(--mv-border);
            border-radius: var(--mv-radius-lg);
            backdrop-filter: var(--mv-glass-blur);
            box-shadow: var(--mv-shadow-lg);
            text-align: center;
        }
        .redirect-card__logo {
            width: 56px; height: 56px; margin: 0 auto var(--mv-space-md);
            opacity: 0.92;
        }
        .redirect-card__eyebrow {
            font-size: 0.72rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--mv-theme-primary);
            margin-bottom: var(--mv-space-sm);
        }
        .redirect-card__title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: var(--mv-space-sm);
        }
        .redirect-card__sub {
            font-size: 0.92rem;
            color: var(--mv-text-muted);
            margin-bottom: var(--mv-space-lg);
            line-height: 1.55;
        }
        .redirect-spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--mv-border-strong);
            border-top-color: var(--mv-theme-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .redirect-card__hint {
            margin-top: var(--mv-space-lg);
            font-size: 0.78rem;
            color: var(--mv-text-dim);
        }
    </style>
</head>
<body>
    <main class="redirect-wrap">
        <div class="redirect-card">
            <img src="assets/logo.png" alt="metavis1on" class="redirect-card__logo" onerror="this.style.display='none'">
            <div class="redirect-card__eyebrow">Yetkili Modül</div>
            <h1 class="redirect-card__title">Borç Yönetim Paneli</h1>
            <p class="redirect-card__sub">
                Borç paneli artık yönetici merkezi üzerinden açılır.
                <br>
                <span class="redirect-spinner" aria-hidden="true"></span>
                Yönlendiriliyor...
            </p>
            <a href="/admin/borc/" class="mv-btn mv-btn--primary mv-btn--block mv-btn--lg">
                Yönetici Paneline Git
            </a>
            <div class="redirect-card__hint">
                Otomatik yönlendirme çalışmazsa yukarıdaki butona tıklayın.
                <br>
                Oturum yoksa önce giriş yapmanız istenir.
            </div>
        </div>
    </main>

    <script>
        // JS aktifse instant yönlendirme — meta-refresh fallback olarak kalır
        setTimeout(function () {
            window.location.replace('/admin/borc/');
        }, 250);
    </script>
</body>
</html>
